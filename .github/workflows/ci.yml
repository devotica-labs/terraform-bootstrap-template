# CI for terraform-bootstrap-template.
#
# This is a TEMPLATE repo — no real `terraform apply` runs here. CI's job is to
# catch HCL syntax / formatting / lint errors before downstream forks (the
# per-account bootstrap repos) inherit them.

name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  fmt:
    name: terraform fmt
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: "1.9.5"
          terraform_wrapper: false
      - run: terraform fmt -check -recursive -diff

  validate:
    name: terraform validate (no backend)
    runs-on: ubuntu-22.04
    needs: fmt
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd
        with:
          terraform_version: "1.9.5"
          terraform_wrapper: false
      - name: terraform init
        run: terraform init -backend=false
      - name: terraform validate
        run: terraform validate

  tflint:
    name: tflint
    runs-on: ubuntu-22.04
    needs: fmt
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: terraform-linters/setup-tflint@90f302c255ef959cbfb4bd10581afecdb7ece3e6 # v4.0.0
        with:
          tflint_version: v0.50.3
      - name: tflint init
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: tflint --init
      - name: tflint
        run: tflint --format compact

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ github.token }}
